<script>
  (function () {
    var host = window.location.hostname;
    if (host !== 'localhost' && host !== '127.0.0.1') {
      return;
    }

    function fixContactAnchors() {
      var links = document.querySelectorAll('a[href="/#contact"], a[href="/zh/#contact"]');
      links.forEach(function (link) {
        link.setAttribute('href', window.location.pathname + '#contact');
      });
    }

    function localizeLanguageLinks() {
      var links = document.querySelectorAll('.i18n-dropdown a.dropdown-item');
      links.forEach(function (link) {
        var target = link.getAttribute('data-target');
        if (!target) {
          try {
            target = new URL(link.href).pathname;
          } catch (error) {
            return;
          }
        }

        link.href = window.location.origin + target;
        link.addEventListener('click', function (event) {
          event.preventDefault();
          window.location.assign(window.location.origin + target);
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        fixContactAnchors();
        localizeLanguageLinks();
      });
    } else {
      fixContactAnchors();
      localizeLanguageLinks();
    }
  })();
</script>
<script>
  (function () {
    var choiceKey = 'jim-theme-choice';
    var legacyLabKey = 'jim-theme-style';

    function isAutoDarkNow() {
      var hour = new Date().getHours();
      return hour < 7 || hour >= 19;
    }

    function ensureLabThemeStyle() {
      if (document.getElementById('jim-lab-theme-style')) return;

      var style = document.createElement('style');
      style.id = 'jim-lab-theme-style';
      style.textContent = `
        html.lab-theme body,
        body.lab-theme,
        body[data-theme-style="lab"] {
          background: #eafffb !important;
          color: #142f38 !important;
        }

        html.lab-theme body .page-body,
        body.lab-theme .page-body,
        body[data-theme-style="lab"] .page-body {
          background:
            radial-gradient(circle at 12% 8%, rgba(0, 188, 174, 0.24), transparent 28rem),
            radial-gradient(circle at 86% 18%, rgba(124, 58, 237, 0.2), transparent 28rem),
            linear-gradient(180deg, #eafffb 0, #f8f4ff 100%) !important;
        }

        html.lab-theme body .home-section,
        body.lab-theme .home-section,
        body[data-theme-style="lab"] .home-section {
          background: transparent !important;
        }

        html.lab-theme body #about,
        body.lab-theme #about,
        body[data-theme-style="lab"] #about {
          background:
            linear-gradient(135deg, rgba(221, 255, 249, 0.98), rgba(242, 232, 255, 0.96)) !important;
          border-bottom: 1px solid rgba(0, 169, 157, 0.18);
        }

        html.lab-theme body .page-header,
        html.lab-theme body .navbar,
        body.lab-theme .page-header,
        body.lab-theme .navbar,
        body[data-theme-style="lab"] .page-header,
        body[data-theme-style="lab"] .navbar {
          background: linear-gradient(90deg, #dffff8, #f0e7ff) !important;
          border-bottom: 4px solid #00a99d !important;
          box-shadow: 0 12px 30px rgba(0, 124, 137, 0.2) !important;
        }

        html.lab-theme body a,
        body.lab-theme a,
        body[data-theme-style="lab"] a,
        html.lab-theme body .network-icon a,
        body.lab-theme .network-icon a,
        body[data-theme-style="lab"] .network-icon a {
          color: #008b8b !important;
        }

        html.lab-theme body .section-heading h1,
        body.lab-theme .section-heading h1,
        body[data-theme-style="lab"] .section-heading h1 {
          color: #142f38 !important;
        }

        html.lab-theme body .section-heading h1::after,
        body.lab-theme .section-heading h1::after,
        body[data-theme-style="lab"] .section-heading h1::after {
          content: "";
          display: block;
          width: 6.5rem;
          height: 4px;
          margin: 0.55rem auto 0;
          background: linear-gradient(90deg, #00a99d, #7c3aed);
          border-radius: 999px;
        }

        body.lab-theme .wg-skills .skills-content .section-subheading::after,
        body[data-theme-style="lab"] .wg-skills .skills-content .section-subheading::after {
          content: "";
          display: block;
          width: 15rem;
          max-width: 100%;
          height: 2px;
          margin: 0.75rem auto 0;
          background: rgba(20, 47, 56, 0.22);
        }

        html.lab-theme body .avatar,
        body.lab-theme .avatar,
        body[data-theme-style="lab"] .avatar {
          box-shadow:
            0 0 0 7px rgba(0, 188, 174, 0.2),
            0 0 0 13px rgba(124, 58, 237, 0.1),
            0 18px 46px rgba(36, 21, 80, 0.18) !important;
        }

        html.lab-theme body .selected-pub-thumb,
        html.lab-theme body .personal-gallery-item img,
        body.lab-theme .selected-pub-thumb,
        body.lab-theme .personal-gallery-item img,
        body[data-theme-style="lab"] .selected-pub-thumb,
        body[data-theme-style="lab"] .personal-gallery-item img {
          box-shadow:
            0 16px 38px rgba(18, 42, 54, 0.16),
            0 0 0 2px rgba(0, 188, 174, 0.18),
            0 0 32px rgba(124, 58, 237, 0.16) !important;
        }

        html.lab-theme body .personal-gallery-filters button.active,
        body.lab-theme .personal-gallery-filters button.active,
        body[data-theme-style="lab"] .personal-gallery-filters button.active {
          background: linear-gradient(135deg, #00a99d, #7c3aed) !important;
          border-color: #00a99d !important;
          color: #fff !important;
        }

        html.lab-theme body .project-filters .btn.btn-primary,
        body.lab-theme .project-filters .btn.btn-primary,
        body[data-theme-style="lab"] .project-filters .btn.btn-primary {
          background: #fff !important;
          color: #111827 !important;
          border: 1px solid rgba(17, 24, 39, 0.22) !important;
          border-radius: 999px !important;
          padding: 0.45rem 0.85rem !important;
          font-size: 0.95rem !important;
          line-height: 1.2 !important;
          box-shadow: none !important;
        }

        html.lab-theme body .project-filters .btn.btn-primary.active,
        html.lab-theme body .project-filters .btn.btn-primary:hover,
        html.lab-theme body .project-filters .btn.btn-primary:focus,
        body.lab-theme .project-filters .btn.btn-primary.active,
        body.lab-theme .project-filters .btn.btn-primary:hover,
        body.lab-theme .project-filters .btn.btn-primary:focus,
        body[data-theme-style="lab"] .project-filters .btn.btn-primary.active,
        body[data-theme-style="lab"] .project-filters .btn.btn-primary:hover,
        body[data-theme-style="lab"] .project-filters .btn.btn-primary:focus {
          background: linear-gradient(135deg, #00a99d, #7c3aed) !important;
          border-color: #00a99d !important;
          color: #fff !important;
        }
      `;
      document.head.appendChild(style);
    }

    function applyActiveMenu(choice) {
      document.querySelectorAll('.theme-dropdown .dropdown-item').forEach(function (button) {
        var isActive =
          (choice === 'superfluid' && button.hasAttribute('data-set-theme-superfluid')) ||
          (choice === 'lab' && button.hasAttribute('data-set-theme-lab')) ||
          (choice === 'light' && button.classList.contains('js-set-theme-light')) ||
          (choice === 'dark' && button.classList.contains('js-set-theme-dark')) ||
          (choice === 'auto' && button.classList.contains('js-set-theme-auto'));

        button.classList.toggle('dropdown-item-active', isActive);
      });
    }

    function applyLabTheme(enabled) {
      ensureLabThemeStyle();
      document.documentElement.classList.toggle('lab-theme', enabled);
      document.body.classList.toggle('lab-theme', enabled);
      document.body.dataset.themeStyle = enabled ? 'lab' : '';
    }

    function applySuperfluidTheme(enabled) {
      document.documentElement.classList.toggle('superfluid-theme', enabled);
      document.body.classList.toggle('superfluid-theme', enabled);
      if (enabled) {
        document.body.dataset.themeStyle = 'superfluid';
      } else if (document.body.dataset.themeStyle === 'superfluid') {
        document.body.dataset.themeStyle = '';
      }
    }

    function applyBaseTheme(isDark) {
      document.body.classList.toggle('dark', isDark);
      localStorage.setItem('wcTheme', isDark ? '1' : '0');
    }

    function setThemeChoice(choice) {
      localStorage.setItem(choiceKey, choice);
      localStorage.removeItem(legacyLabKey);

      if (choice === 'superfluid') {
        applyBaseTheme(true);
        applyLabTheme(false);
        applySuperfluidTheme(true);
      } else if (choice === 'lab') {
        applyBaseTheme(false);
        applySuperfluidTheme(false);
        applyLabTheme(true);
      } else if (choice === 'dark') {
        applyLabTheme(false);
        applySuperfluidTheme(false);
        applyBaseTheme(true);
      } else if (choice === 'auto') {
        applyLabTheme(false);
        applySuperfluidTheme(false);
        applyBaseTheme(isAutoDarkNow());
      } else {
        applyLabTheme(false);
        applySuperfluidTheme(false);
        applyBaseTheme(false);
      }

      applyActiveMenu(choice);
    }

    function ensureThemeMenu() {
      var menu = document.querySelector('.theme-dropdown .dropdown-menu');
      if (!menu) return;

      var superfluidButton = menu.querySelector('[data-set-theme-superfluid]');
      var labButton = menu.querySelector('[data-set-theme-lab]');
      var lightButton = menu.querySelector('.js-set-theme-light');
      var darkButton = menu.querySelector('.js-set-theme-dark');
      var autoButton = menu.querySelector('.js-set-theme-auto');

      if (!superfluidButton) {
        superfluidButton = document.createElement('a');
        superfluidButton.href = '#';
        superfluidButton.className = 'dropdown-item js-set-theme-superfluid';
        superfluidButton.setAttribute('data-set-theme-superfluid', '');
        superfluidButton.innerHTML = '<span>Superfluid</span>';
      }

      if (!labButton) {
        labButton = document.createElement('a');
        labButton.href = '#';
        labButton.className = 'dropdown-item js-set-theme-lab';
        labButton.setAttribute('data-set-theme-lab', '');
        labButton.innerHTML = '<span>Lab</span>';
      }

      [superfluidButton, labButton, lightButton, darkButton, autoButton].forEach(function (button) {
        if (button) menu.appendChild(button);
      });
    }

    document.addEventListener('click', function (event) {
      var superfluidButton = event.target.closest('[data-set-theme-superfluid]');
      var labButton = event.target.closest('[data-set-theme-lab]');
      var lightButton = event.target.closest('.js-set-theme-light');
      var darkButton = event.target.closest('.js-set-theme-dark');
      var autoButton = event.target.closest('.js-set-theme-auto');

      if (!superfluidButton && !labButton && !lightButton && !darkButton && !autoButton) return;

      event.preventDefault();
      event.stopPropagation();

      if (superfluidButton) setThemeChoice('superfluid');
      if (labButton) setThemeChoice('lab');
      if (lightButton) setThemeChoice('light');
      if (darkButton) setThemeChoice('dark');
      if (autoButton) setThemeChoice('auto');
    }, true);

    function initThemeController() {
      ensureThemeMenu();

      var url = new URL(window.location.href);
      var urlTheme = url.searchParams.get('theme');
      var savedChoice = localStorage.getItem(choiceKey);

      if (urlTheme === 'superfluid' || urlTheme === 'lab' || urlTheme === 'light' || urlTheme === 'dark' || urlTheme === 'auto') {
        setThemeChoice(urlTheme);
      } else if (savedChoice) {
        setThemeChoice(savedChoice);
      } else {
        setThemeChoice('lab');
      }

      window.setInterval(function () {
        if (localStorage.getItem(choiceKey) === 'auto') {
          setThemeChoice('auto');
        }
      }, 60000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initThemeController);
    } else {
      initThemeController();
    }
  })();
</script>




<script>
  (function () {
    var canvas;
    var ctx;
    var width = 0;
    var height = 0;
    var atoms = [];
    var mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false };
    var loadingCenter = { x: mouse.x, y: mouse.y, startedAt: 0, active: false };
    var lastSpawn = 0;
    var raf = 0;

    function isSuperfluid() {
      return document.body.classList.contains('superfluid-theme') || document.body.dataset.themeStyle === 'superfluid';
    }

    function isAtomLoadingZone(target) {
      if (!target || !target.closest) return false;
      if (target.closest('.page-header, .navbar, .dropdown-menu, .nav-icons, button, a, input, textarea, select, label')) return false;
      return !!target.closest('.page-body, main, .home-section');
    }

    function ensureCanvas() {
      if (canvas) return;
      canvas = document.createElement('canvas');
      canvas.id = 'jim-superfluid-loader-canvas';
      canvas.setAttribute('aria-hidden', 'true');
      canvas.style.position = 'fixed';
      canvas.style.inset = '0';
      canvas.style.zIndex = '2';
      canvas.style.pointerEvents = 'none';
      canvas.style.mixBlendMode = 'screen';
      canvas.style.filter = 'saturate(1.35) brightness(1.18)';
      canvas.style.opacity = '0';
      canvas.style.transition = 'opacity 240ms ease';
      document.body.appendChild(canvas);
      ctx = canvas.getContext('2d');
      resizeCanvas();
    }

    function resizeCanvas() {
      if (!canvas) return;
      var ratio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function spawnLattice(now) {
      if (!mouse.active || now - lastSpawn < 120 || !isSuperfluid()) return;
      lastSpawn = now;
      if (!loadingCenter.active) {
        loadingCenter.active = true;
        loadingCenter.x = mouse.x;
        loadingCenter.y = mouse.y;
        loadingCenter.startedAt = now;
      }

      var loadTime = Math.min(1, (now - loadingCenter.startedAt) / 10000);
      var radius = 14 + 166 * (loadTime * loadTime * (3 - 2 * loadTime));
      var spacing = 18;
      var jitter = 2.6;
      for (var gx = -radius; gx <= radius; gx += spacing) {
        for (var gy = -radius; gy <= radius; gy += spacing) {
          var d = Math.sqrt(gx * gx + gy * gy);
          if (Math.max(Math.abs(gx), Math.abs(gy)) > radius || Math.random() < 0.48) continue;
          var edgeFalloff = 1 - Math.max(Math.abs(gx), Math.abs(gy)) / Math.max(radius, 1);
          atoms.push({
            x: loadingCenter.x + gx + (Math.random() - 0.5) * jitter,
            y: loadingCenter.y + gy + (Math.random() - 0.5) * jitter,
            vx: (Math.random() - 0.5) * 0.06,
            vy: (Math.random() - 0.5) * 0.06,
            life: 0,
            ttl: mouse.active ? 18000 + Math.random() * 4000 : 2000,
            size: 1.9 + Math.random() * 1.8,
            phase: Math.random() * Math.PI * 2,
            hue: Math.random() < 0.72 ? 176 : 263,
            alpha: 0.72 + edgeFalloff * 1.85
          });
        }
      }
      if (atoms.length > 1000) atoms.splice(0, atoms.length - 1000);
    }

    function drawAtom(atom, brightness) {
      var color = atom.hue === 176 ? '101, 255, 241' : '181, 132, 255';
      var glow = ctx.createRadialGradient(atom.x, atom.y, 0, atom.x, atom.y, atom.size * 6.5);
      glow.addColorStop(0, 'rgba(' + color + ',' + Math.min(1, 2.05 * brightness) + ')');
      glow.addColorStop(0.38, 'rgba(' + color + ',' + Math.min(1, 1.32 * brightness) + ')');
      glow.addColorStop(1, 'rgba(' + color + ',0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(atom.x, atom.y, atom.size * 13.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255, 255, 255,' + Math.min(1, 2.1 * brightness) + ')';
      ctx.beginPath();
      ctx.arc(atom.x, atom.y, atom.size * 1.55, 0, Math.PI * 2);
      ctx.fill();
    }

    function frame(now) {
      ensureCanvas();
      var active = isSuperfluid();
      canvas.style.opacity = active ? '1' : '0';
      ctx.clearRect(0, 0, width, height);
      if (active) {
        spawnLattice(now);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (var i = atoms.length - 1; i >= 0; i--) {
          var atom = atoms[i];
          atom.life += 16.7;
          atom.x += atom.vx;
          atom.y += atom.vy;
          var t = atom.life / atom.ttl;
          if (t >= 1) {
            atoms.splice(i, 1);
            continue;
          }
          var pulse = 0.65 + 0.35 * Math.sin(now / 110 + atom.phase);
          var loadTime = Math.min(1, atom.life / 10000);
          var slowLoad = Math.pow(loadTime, 1.55);
          var fadeIn = 0.03 + 0.97 * slowLoad * slowLoad * (3 - 2 * slowLoad);
          var fadeOut = t < 0.78 ? 1 : Math.pow(1 - (t - 0.78) / 0.22, 1.4);
          drawAtom(atom, atom.alpha * pulse * fadeIn * fadeOut);
        }
        ctx.restore();
      } else {
        atoms.length = 0;
      }
      raf = window.requestAnimationFrame(frame);
    }

    function start() {
      ensureCanvas();
      if (!raf) raf = window.requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('pointermove', function (event) {
      mouse.x = event.clientX;
      mouse.y = event.clientY;
      var nextActive = isAtomLoadingZone(event.target);
      if (!nextActive) {
        mouse.active = false;
        loadingCenter.active = false;
        atoms.forEach(function (atom) { atom.ttl = Math.min(atom.ttl, atom.life + 2000); });
        return;
      }
      if (!mouse.active || Math.hypot(mouse.x - loadingCenter.x, mouse.y - loadingCenter.y) > 26) {
        loadingCenter.active = false;
      }
      mouse.active = true;
    }, { passive: true });
    window.addEventListener('pointerleave', function () {
      mouse.active = false;
      loadingCenter.active = false;
      atoms.forEach(function (atom) { atom.ttl = Math.min(atom.ttl, atom.life + 2000); });
    });
    window.addEventListener('blur', function () {
      mouse.active = false;
      loadingCenter.active = false;
      atoms.forEach(function (atom) { atom.ttl = Math.min(atom.ttl, atom.life + 2000); });
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', start);
    } else {
      start();
    }
  })();
</script>
